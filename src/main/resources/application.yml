spring:
  application:
    name: hhplus

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      connection-timeout: 10000
      max-lifetime: 60000

  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: false

    hibernate:
      ddl-auto: update

    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.timezone.default_storage: NORMALIZE_UTC
  config:
    import:
      - optional:application-toss.yml
      - optional:application-kafka.yml

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs.yaml

  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO